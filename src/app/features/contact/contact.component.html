<section class="contact" id="contacto" aria-labelledby="contact-heading">

  <!-- Decorative background -->
  <div class="contact__bg" aria-hidden="true">
    <div class="contact__glow contact__glow--a"></div>
    <div class="contact__glow contact__glow--b"></div>
    <div class="contact__grid"></div>
  </div>

  <div class="contact__container">

    <!-- Eyebrow -->
    <span class="contact__eyebrow">¿Tienes un proyecto en mente?</span>

    <!-- Main heading -->
    <h2 class="contact__heading" id="contact-heading" cursorText>
      Hablemos de<br>
      <span class="contact__heading-accent">código</span>
    </h2>

    <!-- Supporting copy -->
    <p class="contact__copy">
      Estoy abierto a oportunidades laborales, colaboraciones o simplemente una
      buena conversación técnica. Respondo en menos de 24&nbsp;h.
    </p>

    <!-- Primary CTA -->
    <a
      class="contact__cta"
      [href]="mailtoHref"
      aria-label="Enviar email a Daniel Negrete"
      cursorAction
    >
      <span class="contact__cta-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </span>
      <span>Hablemos de código</span>
      <svg class="contact__cta-arrow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </svg>
    </a>

    <!-- Email chip -->
    <p class="contact__email-chip">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.84 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.77 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.94a16 16 0 0 0 6.15 6.15l1.2-1.2a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      {{ email }}
    </p>

    <!-- Secondary links -->
    <div class="contact__secondary">
      <a class="contact__ghost-link" [href]="github" target="_blank" rel="noopener noreferrer" cursorAction>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2Z"/></svg>
        Ver GitHub
      </a>
      <span class="contact__divider" aria-hidden="true">·</span>
      <span class="contact__location">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        Alboraya, Valencia
      </span>
    </div>

  </div>
</section>
